<body class="bg-background font-body-lg text-on-background min-h-screen flex items-center justify-center p-md construction-overlay" data-alt="A cinematic wide-angle shot of a sprawling construction site at dusk, featuring towering yellow cranes and a complex steel structural framework against a deep orange and blue sunset sky. The atmosphere is industrious and professional, with high-contrast silhouettes of heavy machinery. The lighting is dramatic, emphasizing the metallic textures and architectural precision of the modern industrial landscape. The overall mood is rugged, reliable, and sophisticated.">
<main class="w-full max-w-[440px] z-10">
<!-- Login Card -->
<div class="bg-surface border border-outline-variant shadow-sm p-xl rounded-lg">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<div class="bg-primary-container p-sm rounded-xl mb-md">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" data-icon="architecture">architecture</span>
</div>
<h1 class="font-h1 text-h1 text-primary">BuildSmart</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Precision Site Management</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-lg" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="email">EMAIL ADDRESS</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-[48px] pr-md py-md bg-surface-container-lowest border border-outline rounded-lg focus:ring-0 focus:border-primary-container transition-all placeholder:text-outline-variant font-body-lg" id="email" placeholder="name@gmail.com" required="" type="email"/>
</div>
<div class="flex items-center gap-xs mt-1 px-xs">
<span class="material-symbols-outlined text-body-sm text-on-surface-variant" data-icon="info" style="font-size: 14px;">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">Use your verified Gmail account for site access.</p>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="password">PASSWORD</label>
<a class="font-body-sm text-body-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-[48px] pr-md py-md bg-surface-container-lowest border border-outline rounded-lg focus:ring-0 focus:border-primary-container transition-all placeholder:text-outline-variant font-body-lg" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] bg-primary text-on-primary font-h3 text-h3 rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-sm" type="submit">
                    Access Portal
                    <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
<!-- Status Context (Industrial Aesthetic) -->
<div class="pt-md border-t border-outline-variant flex flex-col items-center gap-md">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        New to BuildSmart? 
                        <a class="text-primary font-bold hover:underline" href="#">Create an account</a>
</p>
<div class="flex items-center gap-sm">
<div class="h-2 w-2 rounded-full bg-tertiary-container animate-pulse"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Site Servers: Operational</span>
</div>
</div>
</form>
</div>
<!-- Footer Credits -->
<footer class="mt-xl text-center text-on-primary-fixed-dim/60 font-label-caps text-label-caps">
<p>© 2024 BuildSmart Infrastructure V2.4.1</p>
<div class="flex justify-center gap-lg mt-sm">
<a class="hover:text-white transition-colors" href="#">Safety Protocols</a>

<a class="hover:text-white transition-colors" href="#">System Support</a>
</div>
</footer>
